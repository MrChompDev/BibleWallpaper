<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verse of the Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --abyss:      #020d18;
      --deep:       #041e35;
      --mid:        #063252;
      --teal:       #0a7ea4;
      --foam:       #7fe8f5;
      --white-water:#d6f4f9;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--abyss);
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    /* ── Deep background ── */
    .depth-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 80%, rgba(6,50,82,0.9) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(4,30,53,0.7) 0%, transparent 60%),
        linear-gradient(180deg, #020d18 0%, #041e35 40%, #063252 75%, #041e35 100%);
    }

    /* ── Particle + caustic canvas ── */
    #ocean { position: fixed; inset: 0; z-index: 1; }

    /* ── Bioluminescent bloom ── */
    .bloom {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 40% at 50% 55%, rgba(10,126,164,0.13) 0%, transparent 70%),
        radial-gradient(ellipse 30% 25% at 75% 70%, rgba(80,230,200,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 25% 20% at 20% 60%, rgba(80,230,200,0.06) 0%, transparent 55%);
    }

    /* ── Surface shimmer ── */
    .surface {
      position: fixed; top: 0; left: 0; right: 0;
      height: 180px; z-index: 2; pointer-events: none;
      background: linear-gradient(180deg,
        rgba(127,232,245,0.06) 0%, rgba(10,126,164,0.04) 40%, transparent 100%);
      animation: shimmer 8s ease-in-out infinite alternate;
    }
    @keyframes shimmer { from { opacity: 0.6; } to { opacity: 1; } }

    /* ── Wave SVG layers ── */
    .waves {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 2; pointer-events: none; height: 220px;
    }
    .wave { animation: waveShift linear infinite; transform-origin: left center; }
    .wave1 { animation-duration: 18s; opacity: 0.18; }
    .wave2 { animation-duration: 13s; animation-direction: reverse; opacity: 0.12; }
    .wave3 { animation-duration: 22s; opacity: 0.08; }
    @keyframes waveShift {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse 130% 110% at 50% 50%,
        transparent 35%, rgba(2,13,24,0.88) 100%);
    }

    /* ── Corner ornaments ── */
    .corner {
      position: fixed; z-index: 5;
      width: 130px; height: 130px; opacity: 0.4;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 24px; left: 24px; }
    .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .corner.br { bottom: 24px; right: 24px; transform: scale(-1); }

    /* ── Top label ── */
    .day-label {
      position: fixed; top: 40px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: clamp(9px, 0.85vw, 13px);
      letter-spacing: 0.45em;
      color: var(--foam);
      text-transform: uppercase;
      opacity: 0;
      animation: riseIn 1.4s 0.3s ease forwards;
    }

    /* ── Divider ── */
    .hr-ornament {
      display: flex; align-items: center; gap: 16px;
      width: 100%; opacity: 0;
      animation: riseIn 1.2s 0.7s ease forwards;
    }
    .hr-ornament::before, .hr-ornament::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, var(--foam), transparent);
      opacity: 0.45;
    }
    .hr-ornament span {
      color: var(--foam); font-size: clamp(13px, 1.1vw, 17px);
      opacity: 0.7; line-height: 1;
    }

    /* ── Stage ── */
    .stage {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: clamp(60px, 9vw, 140px) clamp(60px, 13vw, 220px);
    }
    .card {
      width: 100%; max-width: min(880px, 88vw);
      display: flex; flex-direction: column;
      align-items: center; gap: clamp(16px, 2vh, 26px);
    }

    /* ── Verse text ── */
    .verse-text {
      font-size: clamp(21px, 2.5vw, 40px);
      font-weight: 300; font-style: italic;
      line-height: 1.7; color: var(--white-water);
      text-align: center; letter-spacing: 0.015em;
      text-shadow:
        0 0 60px rgba(127,232,245,0.18),
        0 2px 30px rgba(10,126,164,0.25);
      opacity: 0;
      animation: riseIn 1.6s 1.0s ease forwards;
    }
    .verse-text::before {
      content: '\201C'; font-size: 1.5em; color: var(--foam);
      line-height: 0; vertical-align: -0.38em; margin-right: 3px; opacity: 0.6;
    }
    .verse-text::after {
      content: '\201D'; font-size: 1.5em; color: var(--foam);
      line-height: 0; vertical-align: -0.38em; margin-left: 3px; opacity: 0.6;
    }

    /* ── Reference ── */
    .verse-ref {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(10px, 0.95vw, 15px);
      letter-spacing: 0.3em; color: var(--foam);
      text-transform: uppercase; opacity: 0;
      animation: riseIn 1.2s 1.5s ease forwards;
    }

    /* ── Date ── */
    .date-str {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%); z-index: 10;
      font-family: 'Josefin Sans', sans-serif; font-weight: 200;
      font-size: clamp(9px, 0.72vw, 12px); letter-spacing: 0.3em;
      color: rgba(127,232,245,0.38); opacity: 0;
      animation: riseIn 1.2s 1.8s ease forwards; white-space: nowrap;
    }

    /* ── Loading ── */
    .status {
      font-family: 'Josefin Sans', sans-serif; font-weight: 200;
      font-size: clamp(10px, 0.9vw, 14px); letter-spacing: 0.25em;
      color: rgba(127,232,245,0.45); animation: pulse 2.5s ease infinite;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; }
    }
  </style>
</head>
<body>

  <div class="depth-bg"></div>
  <canvas id="ocean"></canvas>
  <div class="bloom"></div>
  <div class="surface"></div>

  <!-- Animated wave layers -->
  <svg class="waves" viewBox="0 0 2880 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path class="wave wave1"
      d="M0,80 C240,120 480,40 720,80 C960,120 1200,40 1440,80 C1680,120 1920,40 2160,80 C2400,120 2640,40 2880,80 L2880,220 L0,220 Z"
      fill="rgba(10,126,164,1)"/>
    <path class="wave wave2"
      d="M0,100 C300,60 600,140 900,100 C1200,60 1500,140 1800,100 C2100,60 2400,140 2880,100 L2880,220 L0,220 Z"
      fill="rgba(6,50,82,1)"/>
    <path class="wave wave3"
      d="M0,130 C360,90 720,160 1080,130 C1440,90 1800,160 2160,130 C2520,90 2880,160 2880,130 L2880,220 L0,220 Z"
      fill="rgba(4,30,53,1)"/>
  </svg>

  <div class="vignette"></div>

  <!-- Corner ornaments -->
  <div class="corner tl">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 8 C8 8 8 60 8 70 Q8 92 30 92 L92 92" stroke="#7fe8f5" stroke-width="1.4"/>
      <path d="M8 8 C8 8 60 8 70 8 Q92 8 92 30 L92 92" stroke="#7fe8f5" stroke-width="0.5" opacity="0.35"/>
      <circle cx="8" cy="8" r="3.5" fill="#7fe8f5"/>
      <circle cx="92" cy="92" r="2" fill="#7fe8f5" opacity="0.5"/>
      <path d="M22 8 Q26 15 22 22 Q18 15 22 8Z" fill="#7fe8f5" opacity="0.45"/>
      <path d="M8 22 Q15 26 22 22 Q15 18 8 22Z" fill="#7fe8f5" opacity="0.35"/>
    </svg>
  </div>
  <div class="corner tr">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 8 C8 8 8 60 8 70 Q8 92 30 92 L92 92" stroke="#7fe8f5" stroke-width="1.4"/>
      <path d="M8 8 C8 8 60 8 70 8 Q92 8 92 30 L92 92" stroke="#7fe8f5" stroke-width="0.5" opacity="0.35"/>
      <circle cx="8" cy="8" r="3.5" fill="#7fe8f5"/>
      <circle cx="92" cy="92" r="2" fill="#7fe8f5" opacity="0.5"/>
    </svg>
  </div>
  <div class="corner bl">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 8 C8 8 8 60 8 70 Q8 92 30 92 L92 92" stroke="#7fe8f5" stroke-width="1.4"/>
      <path d="M8 8 C8 8 60 8 70 8 Q92 8 92 30 L92 92" stroke="#7fe8f5" stroke-width="0.5" opacity="0.35"/>
      <circle cx="8" cy="8" r="3.5" fill="#7fe8f5"/>
      <circle cx="92" cy="92" r="2" fill="#7fe8f5" opacity="0.5"/>
    </svg>
  </div>
  <div class="corner br">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 8 C8 8 8 60 8 70 Q8 92 30 92 L92 92" stroke="#7fe8f5" stroke-width="1.4"/>
      <path d="M8 8 C8 8 60 8 70 8 Q92 8 92 30 L92 92" stroke="#7fe8f5" stroke-width="0.5" opacity="0.35"/>
      <circle cx="8" cy="8" r="3.5" fill="#7fe8f5"/>
      <circle cx="92" cy="92" r="2" fill="#7fe8f5" opacity="0.5"/>
    </svg>
  </div>

  <p class="day-label">Verse of the Day</p>

  <div class="stage">
    <div class="card" id="card">
      <p class="status">Loading scripture&hellip;</p>
    </div>
  </div>

  <p class="date-str" id="dateStr"></p>

  <script>
    /* ══ Ocean canvas: bioluminescent particles + caustic light ══ */
    const canvas = document.getElementById('ocean');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [], caustics = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function makeParticle() {
      return {
        x: Math.random() * W,
        y: H + Math.random() * 60,
        r: Math.random() * 2.2 + 0.4,
        vy: -(Math.random() * 0.38 + 0.08),
        vx: (Math.random() - 0.5) * 0.22,
        a: Math.random() * 0.65 + 0.15,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.008 + 0.003,
        bio: Math.random() < 0.15
      };
    }

    function makeCaustic() {
      return {
        x: Math.random() * W,
        y: Math.random() * H * 0.55,
        w: Math.random() * 120 + 40,
        h: Math.random() * 14 + 4,
        rot: Math.random() * Math.PI,
        a: Math.random() * 0.055 + 0.01,
        speed: (Math.random() - 0.5) * 0.0015,
        driftX: (Math.random() - 0.5) * 0.12,
        driftY: Math.random() * 0.055 + 0.02
      };
    }

    function initScene() {
      particles = Array.from({ length: 180 }, makeParticle);
      caustics  = Array.from({ length: 28 },  makeCaustic);
    }

    function drawFrame(t) {
      ctx.clearRect(0, 0, W, H);

      /* caustic light shafts */
      for (const c of caustics) {
        c.rot += c.speed;
        c.x   += c.driftX;
        c.y   += c.driftY;
        if (c.y > H * 0.65) Object.assign(c, makeCaustic(), { y: -20 });
        if (c.x < -150 || c.x > W + 150) c.x = Math.random() * W;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        const g = ctx.createRadialGradient(0, 0, 0, 0, 0, c.w / 2);
        g.addColorStop(0, `rgba(127,232,245,${c.a})`);
        g.addColorStop(1, 'transparent');
        ctx.scale(1, c.h / c.w);
        ctx.beginPath();
        ctx.arc(0, 0, c.w / 2, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.restore();
      }

      /* floating bioluminescent orbs */
      for (const p of particles) {
        p.x += p.vx + Math.sin(t * p.speed + p.phase) * 0.28;
        p.y += p.vy;
        if (p.y < -10) Object.assign(p, makeParticle(), { y: H + 10 });

        const alpha = p.a * (0.4 + 0.6 * Math.sin(t * p.speed * 2 + p.phase));
        const col   = p.bio
          ? `rgba(80,230,180,${alpha})`
          : `rgba(127,232,245,${alpha})`;

        const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 6);
        glow.addColorStop(0, col);
        glow.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 6, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.fill();
      }
      requestAnimationFrame(drawFrame);
    }

    resize();
    initScene();
    window.addEventListener('resize', () => { resize(); initScene(); });
    requestAnimationFrame(drawFrame);

    /* ══ Date ══ */
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const wdays  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const now    = new Date();
    document.getElementById('dateStr').textContent =
      `${wdays[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

    /* ══ Verse fetch ══ */
    const FALLBACK = {
      text: "He stilled the storm to a whisper; the waves of the sea were hushed.",
      ref:  "Psalm 107:29"
    };

    function renderVerse(text, ref) {
      document.getElementById('card').innerHTML = `
        <div class="hr-ornament"><span>〰</span></div>
        <p class="verse-text">${text}</p>
        <p class="verse-ref">${ref}</p>
        <div class="hr-ornament" style="animation-delay:1.7s"><span>〰</span></div>
      `;
    }

    async function fetchVerse() {
      const apis = [
        async () => {
          const r = await fetch('https://labs.bible.org/api/?passage=votd&type=json', { cache: 'no-store' });
          const [d] = await r.json();
          return { text: d.text, ref: `${d.bookname} ${d.chapter}:${d.verse}` };
        },
        async () => {
          const pool = ['john/3:16','psalm/23:1','philippians/4:13','romans/8:28',
                        'jeremiah/29:11','proverbs/3:5-6','isaiah/40:31','matthew/11:28',
                        'psalm/107:29','isaiah/43:2'];
          const r = await fetch(
            `https://bible-api.com/${encodeURIComponent(pool[now.getDate() % pool.length])}?translation=kjv`
          );
          const d = await r.json();
          return { text: d.text.trim(), ref: d.reference };
        }
      ];
      for (const api of apis) {
        try {
          const v = await api();
          if (v?.text) { renderVerse(v.text, v.ref); return; }
        } catch (_) {}
      }
      renderVerse(FALLBACK.text, FALLBACK.ref);
    }

    fetchVerse();
  </script>
</body>
</html>
